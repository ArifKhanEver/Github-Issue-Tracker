        * {

<body class="bg-[#F8FAFC]">
    <header>
        <nav class="bg-base-100 shadow-sm px-4 md:px-20 md:py-2">
            <div class="navbar flex justify-between max-w-[1260px] mx-auto">
                <div class="flex">
                    <div class="text-lg md:text-2xl font-semibold items-center">
                        <img src="./assets/github-logo.png" alt="github-logo" class="inline-block" width="30px"> GitHub Issues Tracker
                    </div>
                </div>
                <div class="flex gap-2">
                    <input id="searchField" type="text" placeholder="Search issues..." class="input input-bordered w-full md:max-w-xs" />
                    <button class="btn btn-primary hidden md:block"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-[1200px] w-[90%] md:w-[75%] my-[60px] mx-auto flex flex-col gap-4">
        <section id="tabs" class="tabs bg-white p-6 flex gap-4 shadow-sm">
            <button onclick="activeTabs(0);" class="tabBtn btn btn-primary btn-sm md:btn-md w-20 md:w-24">All</button>
            <button onclick="activeTabs(1);" class="tabBtn btn btn-primary btn-outline btn-sm md:btn-md w-20 md:w-24">Open</button>
            <button onclick="activeTabs(2);" class="tabBtn btn btn-primary btn-outline btn-sm md:btn-md w-20 md:w-24">Closed</button>
        </section>

        <section class="issues bg-[#ffffff] shadow-sm mb-16">
            <div class="issueTotal flex justify-between p-6">
                <div class="total flex items-center gap-2">
                    <img src="./assets/Aperture.png" alt="issueTotal">
                    <div>
                        <h4 class="text-[20px] font-semibold"><span id="issueCount">0</span> Issues</h4>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="issueInfo flex flex-col md:flex-row gap-2 md:gap-4 items-center">
                    <div class="open flex items-center gap-2">
                        <span class="w-3 h-3 bg-[#10B981] rounded-full"></span> 
                        <span class="text-gray-700 font-medium">Open</span>
                    </div>
                    <div class="close flex items-center gap-2">
                        <span class="w-3 h-3 bg-[#A855F7] rounded-full"></span>
                        <span class="text-gray-700 font-medium">Close</span>
                    </div>
                </div>
            </div>

            <div id="loader" class="pt-9 flex justify-center">
                <span class="loading loading-ring loading-xl"></span>
            </div>

            <div id="issueCards" class="issueCards bg-[#FBFBFB] p-6 grid grid-cols-1 md:grid-cols-4 gap-3">
